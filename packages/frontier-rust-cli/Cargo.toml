[package]
name = "frontier-max-cli"
version = "0.1.0"
edition = "2024"
description = "Fast, metadata-only CLI for Frontier Max routing policies"
license = "MIT"
repository = "https://github.com/mcp97/frontiermax"
rust-version = "1.85"

[[bin]]
name = "frontier"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
codegen-units = 1
lto = "thin"
opt-level = 3
panic = "abort"
strip = true

